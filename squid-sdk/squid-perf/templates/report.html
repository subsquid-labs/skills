  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\" data-theme=\"light\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>squid-perf report<\/title>\n\n<!--\n  TEMPLATE CONTRACT\n  =================\n  This file is consumed by scripts/report.mjs. The renderer will:\n    1. Parse the <script id=\"__REPORT_DATA__\" type=\"application/json\"> block and REPLACE its\n       contents with the computed ReportData payload (schema below).\n    2. Leave the rest of the document alone.\n\n  ReportData shape (TypeScript-ish):\n    {\n      run: {\n        id: string,                       // ISO timestamp dir name\n        createdAt: string,                // ISO\n        downtimeThresholdSec: number,\n        breakpointsOverride: string | null,\n      },\n      mode: \"single\" | \"compare\",\n      indexers: Indexer[],                // length 1 in single mode, >=2 in compare\n      headline: {\n        kind: \"delta\" | \"solo\" | \"inconclusive\",\n        fasterLabel?: string,             // e.g. \"optimized\"\n        slowerLabel?: string,\n        deltaPct?: number,                // signed: positive = fasterLabel faster\n        wallSecFaster?: number,\n        wallSecSlower?: number,\n        note?: string,\n      },\n      services: Service[],                // compared (in all indexers)\n      soloServices: Service[],            // in only some indexers\n      infraServices: InfraService[],      // non-sync services (db, init) — tier-3 charts only\n      warnings: Warning[],                // global warnings (duplicated inline on affected svc)\n      fetchFailures: string[],            // list of labels that failed fetch\n    }\n\n    type Indexer = { label: string, ref: string, since: string, slug: string, live?: boolean, wasAlreadyCaughtUp?: boolean, stillSyncing?: boolean }\n    type Warning  = { kind: \"range-divergence\" | \"live\" | \"never-caught-up\" | \"already-caught-up\" | \"solo-service\" | \"fetch-failed\" | \"parse-failed\", service?: string, label?: string, message: string }\n    type Service  = {\n      name: string,\n      presentIn: string[],                // indexer labels\n      verdict?: { faster: string, slower: string, deltaPct: number },\n      firstBlock: number, effectiveEndBlock: number,\n      breakpoints: {\n        pct: number | null,               // null when --breakpoints override used\n        block: number,\n        perIndexer: { [label: string]: { wallSec: number, activeSec: number, downtimeSec: number, reached: boolean } | null },\n      }[],\n      progress: { [label: string]: { t: number, block: number }[] },  // downsampled for chart\n      tier2: { [label: string]: { restarts: number, errors: number, warns: number, multicallP95Ms?: number, multicallMeanMs?: number } },\n      tier3: {\n        namespace: string,\n        field: string,\n        unit?: string,\n        perIndexer: { [label: string]: { count: number, mean: number, median: number, p95: number } | null },\n      }[],\n      inlineWarnings: Warning[],\n      logExcerpts?: {                     // optional — populated when --include-excerpts\n        [label: string]: { [blockBreakpoint: number]: string[] }, // window of ~10 log lines around each breakpoint\n      },\n    }\n    type InfraService = {\n      name: string,\n      kind: \"infra\",\n      presentIn: string[],\n      firstTsMs: number | null,\n      lastTsMs: number | null,\n      spanMs: number | null,\n      perIndexer: { [label: string]: { firstTsMs: number|null, lastTsMs: number|null, spanMs: number|null, lineCount: number, errorCount: number } },\n      tier3: {\n        namespace: string,\n        field: string | null,             // null = count-only namespace\n        perIndexer: { [label: string]: {\n          count: number,\n          mean?: number, median?: number, p95?: number, min?: number, max?: number,\n          timeseries?: { t: number, v: number }[],   // t = seconds from perIndexer.firstTsMs\n        } | null },\n      }[],\n    }\n\n  To extend: the renderer should only emit keys listed above. Everything visual\n  (grids, tables, verdict chip colors) is derived on the client from ReportData.\n-->\n\n<style>\n  /* ─── tokens ──────────────────────────────────────────────────────────── */\n  :root {\n    --font-sans: ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Inter, Roboto, \"Helvetica Neue\", Arial, sans-serif;\n    --font-mono: \"JetBrains Mono\", ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, Consolas, monospace;\n\n    --bg:        oklch(99% 0.003 250);\n    --surface:   oklch(97.5% 0.004 250);\n    --surface-2: oklch(95% 0.005 250);\n    --border:    oklch(91% 0.008 250);\n    --border-strong: oklch(84% 0.01 250);\n    --fg:        oklch(18% 0.015 250);\n    --fg-2:      oklch(38% 0.015 250);\n    --fg-3:      oklch(55% 0.012 250);\n\n    --accent:    oklch(58% 0.18 255);   /* SQD-ish blue */\n    --accent-2:  oklch(72% 0.16 200);   /* teal-ish for 2nd series */\n    --accent-3:  oklch(68% 0.18 310);   /* violet for 3rd+ */\n    --accent-fg: oklch(98% 0 0);\n\n    --ok:        oklch(58% 0.15 155);\n    --bad:       oklch(56% 0.19 25);\n    --warn:      oklch(70% 0.15 75);\n\n    --radius: 8px;\n    --radius-sm: 5px;\n    --radius-lg: 12px;\n\n    --shadow-1: 0 1px 0 oklch(0% 0 0 / 0.03), 0 1px 2px oklch(0% 0 0 / 0.04);\n    --shadow-2: 0 1px 0 oklch(0% 0 0 / 0.04), 0 8px 24px oklch(0% 0 0 / 0.06);\n\n    --mono-num: \"tnum\" 1, \"lnum\" 1;\n  }\n  :root[data-theme=\"dark\"] {\n    --bg:        oklch(13% 0.008 250);\n    --surface:   oklch(16.5% 0.009 250);\n    --surface-2: oklch(20% 0.01 250);\n    --border:    oklch(24% 0.01 250);\n    --border-strong: oklch(32% 0.012 250);\n    --fg:        oklch(96% 0.004 250);\n    --fg-2:      oklch(76% 0.006 250);\n    --fg-3:      oklch(58% 0.01 250);\n\n    --accent:    oklch(72% 0.16 245);\n    --accent-2:  oklch(80% 0.14 195);\n    --accent-3:  oklch(78% 0.16 315);\n\n    --ok:        oklch(72% 0.16 155);\n    --bad:       oklch(72% 0.18 25);\n    --warn:      oklch(82% 0.16 78);\n\n    --shadow-1: 0 1px 0 oklch(0% 0 0 / 0.3), 0 1px 3px oklch(0% 0 0 / 0.35);\n    --shadow-2: 0 1px 0 oklch(0% 0 0 / 0.35), 0 8px 24px oklch(0% 0 0 / 0.4);\n  }\n\n  /* ─── reset / base ────────────────────────────────────────────────────── */\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  html { color-scheme: light dark; }\n  html[data-theme=\"dark\"] { color-scheme: dark; }\n  body {\n    background: var(--bg);\n    color: var(--fg);\n    font-family: var(--font-sans);\n    font-size: 14px;\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    font-feature-settings: \"cv11\", \"ss01\";\n  }\n  code, .mono, [data-mono] { font-family: var(--font-mono); font-feature-settings: var(--mono-num); }\n  .num { font-variant-numeric: tabular-nums; font-feature-settings: var(--mono-num); }\n  a { color: inherit; }\n\n  button, input, select { font: inherit; color: inherit; }\n\n  /* ─── layout ──────────────────────────────────────────────────────────── */\n  .page {\n    max-width: 1280px;\n    margin: 0 auto;\n    padding: 28px 32px 96px;\n  }\n  .stack { display: flex; flex-direction: column; }\n  .row   { display: flex; flex-direction: row; }\n  .gap-1 { gap: 6px; }\n  .gap-2 { gap: 12px; }\n  .gap-3 { gap: 20px; }\n  .gap-4 { gap: 32px; }\n  .center { align-items: center; }\n  .between { justify-content: space-between; }\n  .wrap { flex-wrap: wrap; }\n  .grow { flex: 1 1 0; min-width: 0; }\n\n  /* ─── top bar ─────────────────────────────────────────────────────────── */\n  .topbar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    padding-bottom: 20px;\n    margin-bottom: 28px;\n    border-bottom: 1px solid var(--border);\n  }\n  .brand {\n    display: flex; align-items: center; gap: 10px;\n    font-weight: 600; letter-spacing: -0.01em;\n  }\n  .brand .logo {\n    width: 24px; height ont-size: 22px; font-weight: 500;\n    padding: 2px 8px; border-radius: 6px;\n    background: var(--surface-2); border: 1px solid var(--border);\n    vertical-align: 2px;\n    font-family: var(--font-mono);\n    color: var(--fg);\n  }\n  .hl-sub {\n    color: var(--fg-2); font-size: 14px;\n    display: flex; gap: 20px; flex-wrap: wrap;\n    margin-top: 4px;\n  }\n  .hl-sub > span > b { color: var(--fg); font-weight: 600; }\n\n  .hl-compare-grid {\n    margin-top: 20px;\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 14px;\n  }\n  .hl-stat {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 12px 14px;\n  }\n  .hl-stat .hl-stat-label {\n    font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em;\n    text-transform: uppercase; font-family: var(--font-mono);\n  }\n  .hl-stat-rows { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }\n  .hl-stat-row {\n    display: grid; grid-template-columns: auto 1fr auto;\n    align-items: center; gap: 10px;\n    font-size: 14px;\n  }\n  .hl-stat-row .lab { color: var(--fg-2); font-family: var(--font-mono); font-size: 12px; }\n  .hl-stat-row .val { font-variant-numeric: tabular-nums; font-weight: 600; }\n  .hl-stat-row .bar {\n    height: 6px; border-radius: 3px;\n    background: var(--surface-2); overflow: hidden; position: relative;\n  }\n  .hl-stat-row .bar > i {\n    display: block; height: 100%;\n    background: var(--accent);\n    border-radius: 3px;\n  }\n  .hl-stat-row[data-slot=\"2\"] .bar > i { background: var(--accent-2); }\n  .hl-stat-row[data-slot=\"3\"] .bar > i { background: var(--accent-3); }\n\n  /* solo headline */\n  .headline.solo h1 {\n    font-size: 28px;\n  }\n  .headline.solo .solo-grid {\n    margin-top: 20px;\n    display: grid;\n    grid-template-columns: repeat(4, minmax(0,1fr));\n    gap: 14px;\n  }\n  .solo-stat {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 14px 16px;\n  }\n  .solo-stat .sv { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }\n  .solo-stat .sl { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); font-family: var(--font-mono); margin-bottom: 6px; }\n\n  /* ─── section ─────────────────────────────────────────────────────────── */\n  .section { margin-top: 36px; }\n  .section-title {\n    display: flex; align-items: baseline; gap: 12px;\n    margin: 0 0 14px;\n    font-size: 13px;\n    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n    color: var(--fg-3);\n    font-family: var(--font-mono);\n  }\n  .section-title .count {\n    color: var(--fg-3); font-weight: 500;\n  }\n  .section-title .hr {\n    flex: 1; height: 1px; background: var(--border);\n  }\n\n  /* ─── service card ────────────────────────────────────────────────────── */\n  .svc {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-lg);\n    margin-bottom: 20px;\n    overflow: hidden;\n  }\n  .svc-head {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 16px;\n    padding: 18px 22px;\n    border-bottom: 1px solid var(--border);\n    align-items: center;\n  }\n  .svc-title-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }\n  .svc-title {\n    margin: 0;\n    font-size: 18px;\n    font-weight: 600;\n    letter-spacing: -0.01em;\n    font-family: var(--font-mono);\n  }\n  .svc-meta {\n    color: var(--fg-3);\n    font-size: 12px;\n    font-family: var(--font-mono);\n    display: flex; gap: 14px; flex-wrap: wrap;\n    margin-top: 4px;\n  }\n  .svc-meta b { color: var(--fg-2); font-weight: 500; }\n  .svc-verdict {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 6px 10px;\n    border-radius: 999px;\n    font-size: 12px;\n    font-weight: 600;\n    font-family: var(--font-mono);\n    border: 1px solid transparent;\n  }\n  .svc-verdict.ok   { color: var(--ok);   background: color-mix(in oklch, var(--ok) 14%, transparent); border-color: color-mix(in oklch, var(--ok) 30%, transparent); }\n  .svc-verdict.bad  { color: var(--bad);  background: color-mix(in oklch, var(--bad) 14%, transparent); border-color: color-mix(in oklch, var(--bad) 30%, transparent); }\n  .svc-verdict.warn { color: var(--warn); background: color-mix(in oklch, var(--warn) 14%, transparent); border-color: color-mix(in oklch, var(--warn) 30%, transparent); }\n  .svc-verdict.neutral { color: var(--fg-2); background: var(--surface-2); border-color: var(--border); }\n  .svc-verdict .sym { font-variant-numeric: tabular-nums; }\n\n  .svc-body { padding: 20px 22px 22px; }\n\n  /* inline warnings */\n  .warn-strip { display: flex; flex-direction: column; gap: 8px; padding: 10px 22px; background: color-mix(in oklch, var(--warn) 8%, transparent); border-bottom: 1px solid var(--border); }\n  .warn-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--fg); }\n  .warn-item .wi-icon { color: var(--warn); flex-shrink: 0; margin-top: 2px; }\n  .warn-item .wi-kind { font-family: var(--font-mono); font-size: 11px; color: var(--warn); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-right: 6px; }\n  .warn-item.bad .wi-icon { color: var(--bad); }\n  .warn-item.bad .wi-kind { color: var(--bad); }\n\n  /* panels inside service */\n  .panel-grid {\n    display: grid;\n    grid-template-columns: 1.15fr 1fr;\n    gap: 22px;\n  }\n  .panel-grid.single { grid-template-columns: 1fr; }\n  .panel-title {\n    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--fg-3); font-weight: 600;\n    margin: 0 0 10px;\n    font-family: var(--font-mono);\n    display: flex; align-items: center; gap: 8px;\n  }\n\n  /* ─── breakpoint table ────────────────────────────────────────────────── */\n  .bp-table {\n    width: 100%;\n    bor r(--fg-2);\n  }\n  .bp-pct .pct { font-weight: 600; color: var(--fg); }\n  .bp-pct .blk { color: var(--fg-3); font-size: 11px; }\n\n    /* ─── breakpoint list (replaces legacy table) ────────────────────────── */\n  .bp-list { display: flex; flex-direction: column; gap: 8px; }\n  .bp-item {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 12px 14px 10px;\n    cursor: pointer;\n    transition: border-color .12s, background .08s, box-shadow .12s;\n  }\n  .bp-item:hover { border-color: var(--border-strong); box-shadow: var(--shadow-1); }\n  .bp-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }\n  .bp-item-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }\n  .bp-item-heading { display: flex; align-items: center; gap: 8px; min-width: 0; flex-wrap: wrap; }\n  .bp-pct-chip {\n    display: inline-flex; align-items: center; justify-content: center;\n    font-family: var(--font-mono); font-size: 11px; font-weight: 600;\n    color: var(--fg-2); background: var(--surface-2);\n    border: 1px solid var(--border);\n    padding: 2px 7px; border-radius: 999px; letter-spacing: 0.02em;\n  }\n  .bp-block-val { font-size: 13px; font-weight: 600; color: var(--fg); font-variant-numeric: tabular-nums; }\n  .bp-winner {\n    display: inline-flex; align-items: center; gap: 6px;\n    font-family: var(--font-mono); font-size: 11px;\n    padding: 3px 8px; border-radius: 999px;\n    background: color-mix(in oklch, var(--ok) 12%, transparent);\n    border: 1px solid color-mix(in oklch, var(--ok) 30%, transparent);\n    color: var(--ok); white-space: nowrap;\n  }\n  .bp-winner-dot { width: 6px; height: 6px; border-radius: 50%; }\n  .bp-winner-label { font-weight: 600; color: var(--fg); }\n  .bp-winner-delta { font-weight: 600; }\n  .bp-bars { display: grid; gap: 6px; }\n  .bp-bar-row {\n    display: grid;\n    grid-template-columns: 100px 1fr 140 lue=\"block\">block only<\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<div class=\"copy-hit\" id=\"copy-hit\">copied<\/div>\n\n<!-- Chart.js (UMD). In the real build, report.mjs inlines the file so there's no CDN. -->\n<script src=\"fe45eb0b-379d-4242-9175-b67e524f21b9\"><\/script>\n<script>\n/* squid-perf report renderer\n   Reads #__REPORT_DATA__ (JSON) and mounts the report DOM.\n   Depends on Chart.js being globally available as `Chart`. */\n(() => {\n  // ─── data ─────────────────────────────────────────────────────────────\n  const raw = document.getElementById('__REPORT_DATA__').textContent;\n  let data;\n  try { data = JSON.parse(raw); }\n  catch (e) { document.body.innerHTML = '<pre style=\"padding:40px;color:#c66\">Failed to parse report data: ' + e.message + '<\/pre>'; return; }\n\n  // ─── theme toggle ─────────────────────────────────────────────────────\n  const root = document.documentElement;\n  const savedTheme = localStorage.getItem('sp-theme');\n  if (savedTheme) root.dataset.theme = savedTheme;\n  else if (matchMedia('(prefers-color-scheme: dark)').matches) root.dataset.theme = 'dark';\n  document.getElementById('theme-toggle').onclick = () => {\n    root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';\n    localStorage.setItem('sp-theme', root.dataset.theme);\n    rerenderCharts();\n  };\n\n  // ─── formatters ───────────────────────────────────────────────────────\n  const fmtBlk = (b) => {\n    if (b == null) return '—';\n    if (Math.abs(b) >= 1e9) return (b/1e9).toFixed(2).replace(/\\.?0+$/,'') + 'B';\n    if (Math.abs(b) >= 1e6) return (b/1e6).toFixed(2).replace(/\\.?0+$/,'') + 'M';\n    if (Math.abs(b) >= 1e3) return (b/1e3).toFixed(1).replace(/\\.?0+$/,'') + 'K';\n    return String(b);\n  };\n  const fmtDur = (s) => {\n    if (s == null || !isFinite(s)) return '—';\n    if (s < 60) return s.toFixed(0) + 's';\n    if (s < 3600) {\n      const m = Math.floor(s/60), sec = Math.round(s % 60);\n      return sec ? `${m}m ${sec}s` : `${m}m`;\n    }\n    const h = Math.floor(s/3600), m = Math.round((s % 3600)/60);\n    return m ? `${h}h ${m}m` : `${h}h`;\n  };\n  const fmtDurCompact = (s) => {\n    if (s == null || !isFinite(s)) return '—';\n    if (s < 60) return s.toFixed(0) + 's';\n    if (s < 3600) return (s/60).toFixed(1).replace(/\\.0$/,'') + 'm';\n    return (s/3600).toFixed(1).replace(/\\.0$/,'') + 'h';\n  };\n  const fmtNum = (n, digits = 2) => {\n    if (n == null || !isFinite(n)) return '—';\n    if (n === 0) return '0';\n    if (Math.abs(n) >= 1000) return n.toLocaleString('en-US', { maximumFractionDigits: 0 });\n    if (Math.abs(n) < 0.01) return n.toExponential(1);\n    return (+n.toFixed(digits)).toString();\n  };\n  const pctDelta = (a, b) => (a == null || b == null || b === 0) ? null : ((b - a) / b) * 100;\n\n  // color for a series label — use a stable hash to map to accent vars\n  const LABEL_COLORS = {}; // cached\n  const accentVars = ['--accent', '--accent-2', '--accent-3'];\n  function colorFor(label, indexers) {\n    if (LABEL_COLORS[label]) return LABEL_COLORS[label];\n    const idx = indexers.findIndex(i => i.label === label);\n    const v = accentVars[idx % accentVars.length];\n    LABEL_COLORS[label] = v;\n    return v;\n  }\n  const cssVar = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();\n\n  // ─── top-bar run meta ─────────────────────────────────────────────────\n  const runMeta = document.getElementById('run-meta');\n  {\n    const { run, indexers } = data;\n    const parts = [\n      `<span><b>run<\/b> ${run.id}<\/span>`,\n      `<span><b>downtime&gt;<\/b> ${run.downtimeThresholdSec}s<\/span>`,\n      `<span><b>indexers<\/b> ${indexers.length}<\/span>`,\n    ];\n    if (run.breakpointsOverride) parts.push(`<span><b>bp<\/b> ${escapeHtml(run.breakpointsOverride)}<\/span>`);\n    runMeta.innerHTML = parts.join('');\n  }\n\n  // ─── headline ─────────────────────────────────────────────────────────\n  const headlineEl = document.getElementById('headline');\n  renderHeadline(headlineEl, data);\n\n  // ─── compared section header ─────────────────────────────────────────\n  document.getElementById('compared-count').textContent = `${data.services.length} · ${data.mode === 'single' ? 'single-indexer' : data.indexers.length + '-way compare'}`;\n\n  // ─── services ────────────────────────────────────────────────────────\n  const servicesEl = document.getElementById('services');\n  data.services.forEach(svc => servicesEl.appendChild(renderService(svc, data, /*solo*/false)));\n\n  if ((data.soloServices || []).length) {\n    document.getElementById('solo-wrap').hidden = false;\n    document.getElementById('solo-count').textContent = data.soloServices.length + ' · reference only';\n    const soloEl = document.getElementById('solo-services');\n    data.soloServices.forEach(svc => soloEl.appendChild(renderService(svc, data, /*solo*/true)));\n  }\n\n  if ((data.infraServices || []).length) {\n    document.getElementById('infra-wrap').hidden = false;\n    document.getElementById('infra-count').textContent = data.infraServices.length + ' · non-sync';\n    const infraEl = document.getElementById('infra-services');\n    data.infraServices.forEach(svc => infraEl.appendChild(renderInfraService(svc, data)));\n  }\n\n  // ─── modal ────────────────────────────────────────────────────────────\n  const scrim = document.getElementById('modal-scrim');\n  document.getElementById('modal-close').onclick = () => scrim.classList.remove('open');\n  scrim.onclick = (e) => { if (e.target === scrim) scrim.classList.remove('open'); };\n  addEventListener('keydown', (e) => { if (e.key === 'Escape') scrim.classList.remove('open'); });\n\n  // ─── copy-to-clipboard ──────────────────────────────────────────────\n  const hit = document.getElementById('copy-hit');\n  document.addEventListener('click', (e) => {\n    const el = e.target.closest('[data-copy]');\n    if (!el) return;\n    const val = el.dataset.copy;\n    navigator.clipboard?.writeText(val).then(() => {\n      hit.textContent = 'copied: ' + val.slice(0, 40);\n      hit.classList.add('show');\n      clearTimeout(hit._t);\n      hit._t = setTimeout(() => hit.classList.remove('show'), 1100);\n    });\n  });\n  document.getElementById('copy-md').onclick = () => {\n    const loc = (data.run?.id || 'latest') + '/report.md';\n    navigator.clipboard?.writeText(loc).then(() => {\n      hit.textContent = 'copied: ' + loc;\n      hit.classList.add('show');\n      clearTimeout(hit._t);\n      hit._t = setTimeout(() => hit.classList.remove('show'), 1100);\n    });\n  };\n\n  // ─── tweaks panel ────────────────────────────────────────────────────\n  const tweaksPanel = document.getElementById('tweaks-panel');\n  document.getElementById('tweaks-toggle').onclick = () => tweaksPanel.classList.toggle('open');\n  tweaksPanel.addEventListener('click', (e) => {\n    const chip = e.target.closest('.tweak-chip');\n    if (!chip) return;\n    const group = chip.closest('[data-tweak]').dataset.tweak;\n    chip.parentElement.querySelectorAll('.tweak-chip').forEach(c => c.classList.remove('on'));\n    chip.classList.add('on');\n    applyTweak(group, chip.dataset.value);\n  });\n\n  function applyTweak(group, value) {\n    if (group === 'density') root.dataset.density = value;\n    else if (group === 'accent') root.dataset.accent = value;\n    else if (group === 'bpunit') {\n      root.dataset.bpunit = value;\n      document.querySelectorAll('.bp-pct-chip').forEach(el => {\n        el.style.display = value === 'block' ? 'none' : '';\n      });\n    } else if (group === 'mode') {\n      // swap into single-indexer preview by hiding all but the first indexer\n      previewSingleMode(value === 'single');\n    }\n  }\n\n  function previewSingleMode(single) {\n    // Poor-man's preview: hide every column/row not belonging to the first indexer.\n    const firstLabel = data.indexers[0].label;\n    document.querySelectorAll('[data-label]').forEach(el => {\n      const keep = !single || el.dataset.label === firstLabel;\n      el.style.display = keep ? '' : 'none';\n    });\n    // Swap headline\n    if (single) {\n      renderHeadline(headlineEl, {\n        ...data,\n        mode: 'single',\n        indexers: [data.indexers[0]],\n        headline: {\n          kind: 'solo',\n          note: 'Single-indexer mode — metrics for ' + firstLabel + ' only.'\n        }\n      });\n    } else {\n      renderHeadline(headlineEl, data);\n    }\n    rerenderCharts();\n  }\n\n  // ─── charts ──────────────────────────────────────────────────────────\n  const CHART_INSTANCES = [];\n  function rerenderCharts() { CHART_INSTANCES.forEach(fn => fn()); }\n\n  // kick off chart renders after DOM is settled so canvases have size\n  requestAnimationFrame(() => {\n    document.querySelectorAll('[data-chart]').forEach(canvas => {\n      const svcName = canvas.dataset.chart;\n      const svc = [...(data.services || []), ...(data.soloServices || [])].find(s => s.name === svcName);\n      if (!svc) return;\n      const build = () => drawProgressChart(canvas, svc, data);\n      build();\n      CHART_INSTANCES.push(build);\n    });\n    document.querySelectorAll('[data-infra-chart]').forEach(canvas => {\n      const svcName = canvas.dataset.infraChart;\n      const ns = canvas.dataset.namespace;\n      const field = canvas.dataset.field;\n      const svc = (data.infraServices || []).find(s => s.name === svcName);\n      if (!svc) return;\n      const entry = (svc.tier3 || []).find(e => e.namespace === ns && e.field === field);\n      if (!entry) return;\n      const build = () => drawInfraChart(canvas, svc, entry, data);\n      build();\n      CHART_INSTANCES.push(build);\n    });\n  });\n\n  // ════════════════════════════════════════════════════════════════════\n  //  RENDERERS\n  // ════════════════════════════════════════════════════════════════════\n\n  function renderHeadline(host, d) {\n    host.innerHTML = '';\n    const h = d.headline || {};\n    const el = document.createElement('div');\n    el.className = 'headline';\n\n    if (h.kind === 'delta' && d.mode !== 'single') {\n      const delta = h.deltaPct || 0;\n      const faster = h.fasterLabel || d.indexers[0].label;\n      const slower = h.slowerLabel || d.indexers[1]?.label;\n      el.innerHTML = `\n        <div class=\"hl-label\">Headline · wall-clock · 100% of effective range<\/div>\n        <h1>\n          <span class=\"lbl\"><span class=\"swatch\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:var(${colorFor(faster, d.indexers)})\"><\/span>${escapeHtml(faster)}<\/span>\n          finished\n          <span class=\"delta-num\">${delta.toFixed(1)}%<\/span> faster\n          than\n          <span class=\"lbl\"><span class=\"swatch\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:var(${colorFor(slower, d.indexers)})\"><\/span>${escapeHtml(slower)}<\/span>\n        <\/h1>\n        <div class=\"hl-sub\">\n          <span><b>${fmtDur(h.wallSecFaster)}<\/b> vs <b>${fmtDur(h.wallSecSlower)}<\/b> (wall)<\/span>\n          <span>Saved <b>${fmtDur((h.wallSecSlower||0) - (h.wallSecFaster||0))}<\/b><\/span>\n          ${h.note ? `<span style=\"color:var(--fg-3)\">${escapeHtml(h.note)}<\/span>` : ''}\n        <\/div>\n        ${renderHeadlineCompareGrid(d)}\n      `;\n    } else if (h.kind === 'inconclusive') {\n      el.classList.add('solo');\n      el.innerHTML = `\n        <div class=\"hl-label\">Headline · inconclusive<\/div>\n        <h1>Mixed results across services<\/h1>\n        <div class=\"hl-sub\"><span>${escapeHtml(h.note || 'Some services faster in one deployment, some in the other. See per-service verdicts below.')}<\/span><\/div>\n        ${renderHeadlineCompareGrid(d)}\n      `;\n    } else {\n      // single or solo\n      el.classList.add('solo');\n      const only = d.indexers[0];\n      const totalWall = (d.services||[]).reduce((acc, s) => {\n        const bp = [...(s.breakpoints||[])].reverse().find(b => b.perIndexer[only.label]);\n        return acc + (bp?.perIndexer[only.label]?.wallSec || 0);\n      }, 0);\n      const totalActive = (d.services||[]).reduce((acc, s) => {\n        const bp = [...(s.breakpoints||[])].reverse().find(b => b.perIndexer[only.label]);\n        return acc + (bp?.perIndexer[only.label]?.activeSec || 0);\n      }, 0);\n      const totalDown = totalWall - totalActive;\n      el.innerHTML = `\n        <div class=\"hl-label\">Single-indexer · ${d.services.length} services<\/div>\n        <h1>\n          <span class=\"lbl\"><span class=\"swatch\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:var(${colorFor(only.label, d.indexers)})\"><\/span>${escapeHtml(only.label)}<\/span>\n          performance report\n        <\/h1>\n        <div class=\"hl-sub\">\n          <span><b>${escapeHtml(only.ref)}<\/b><\/span>\n          ${only.live ? `<span style=\"color:var(--warn)\"><b>⦿ live<\/b> — logs still incoming<\/span>` : ''}\n          ${h.note ? `<span style=\"color:var(--fg-3)\">${escapeHtml(h.note)}<\/span>` : ''}\n        <\/div>\n        <div class=\"solo-grid\">\n          <div class=\"solo-stat\"><div class=\"sl\">services<\/div><div class=\"sv\">${d.services.length}<\/div><\/div>\n          <div class=\"solo-stat\"><div class=\"sl\">total wall<\/div><div class=\"sv\">${fmtDur(totalWall)}<\/div><\/div>\n          <div class=\"solo-stat\"><div class=\"sl\">active time<\/div><div class=\"sv\">${fmtDur(totalActive)}<\/div><\/div>\n          <div class=\"solo-stat\"><div class=\"sl\">downtime<\/div><div class=\"sv\" style=\"color:${totalDown > 0 ? 'var(--warn)' : 'inherit'}\">${fmtDur(totalDown)}<\/div><\/div>\n        <\/div>\n      `;\n    }\n    host.appendChild(el);\n  }\n\n  function renderHeadlineCompareGrid(d) {\n    // Per-indexer totals at 100% across all compared services\n    const indexers = d.indexers;\n    const totals = indexers.map(ix => {\n      let wall = 0, active = 0, down = 0;\n      d.services.forEach(s => {\n        const last = [...s.breakpoints].reverse().find(b => b.perIndexer[ix.label]?.reached) || s.breakpoints[s.breakpoints.length-1];\n        const m = last?.perIndexer[ix.label];\n        if (m) { wall += m.wallSec; active += m.activeSec; down += m.downtimeSec; }\n      });\n      return { label: ix.label, wall, active, down };\n    });\n    const maxWall = Math.max(...totals.map(t => t.wall), 1);\n    const maxActive = Math.max(...totals.map(t => t.active), 1);\n    const maxDown = Math.max(...totals.map(t => t.down), 1);\n\n    const row = (t, metric, max, slot) => {\n      const val = t[metric];\n      return `<div class=\"hl-stat-row\" data-slot=\"${slot}\" data-label=\"${escapeAttr(t.label)}\">\n        <span class=\"lab\">${escapeHtml(t.label)}<\/span>\n        <span class=\"bar\"><i style=\"width:${(val/max*100)}%;background:var(${colorFor(t.label, indexers)})\"><\/i><\/span>\n        <span class=\"val num\" data-copy=\"${val}s\">${fmtDur(val)}<\/span>\n      <\/div>`;\n    };\n\n    return `\n      <div class=\"hl-compare-grid\">\n        <div class=\"hl-stat\">\n          <div class=\"hl-stat-label\">Wall clock<\/div>\n          <div class=\"hl-stat-rows\">${totals.map((t,i)=>row(t,'wall',maxWall,i+1)).join('')}<\/div>\n        <\/div>\n        <div class=\"hl-stat\">\n          <div class=\"hl-stat-label\">Active time<\/div>\n          <div class=\"hl-stat-rows\">${totals.map((t,i)=>row(t,'active',maxActive,i+1)).join('')}<\/div>\n        <\/div>\n        <div class=\"hl-stat\">\n          <div class=\"hl-stat-label\">Downtime (gaps &gt; ${d.run.downtimeThresholdSec}s)<\/div>\n          <div class=\"hl-stat-rows\">${totals.map((t,i)=>row(t,'down',maxDown||1,i+1)).join('')}<\/div>\n        <\/div>\n      <\/div>\n    `;\n  }\n\n  // ── service card ─────────────────────────────────────────────────────\n  function renderService(svc, d, isSolo) {\n    const indexers = d.indexers.filter(i => svc.presentIn.includes(i.label));\n    const isCompare = indexers.length > 1;\n\n    const el = document.createElement('article');\n    el.className = 'svc';\n    el.dataset.svc = svc.name;\n\n    const verdict = svc.verdict;\n    let verdictHtml = '';\n    if (isSolo) {\n      verdictHtml = `<span class=\"svc-verdict neutral\">solo<\/span>`;\n    } else if (isCompare && verdict) {\n      const cls = verdict.deltaPct >= 5 ? (verdict.faster ? 'ok' : 'neutral') : 'neutral';\n      verdictHtml = `<span class=\"svc-verdict ${cls}\">\n        <span>${escapeHtml(verdict.faster)}<\/span>\n        <span class=\"sym\">${verdict.deltaPct >= 0 ? '↓' : '↑'} ${Math.abs(verdict.deltaPct).toFixed(1)}%<\/span>\n      <\/span>`;\n    } else if (isCompare) {\n      verdictHtml = `<span class=\"svc-verdict neutral\">inconclusive<\/span>`;\n    } else {\n      verdictHtml = `<span class=\"svc-verdict neutral\">single<\/span>`;\n    }\n\n    const spanBlocks = svc.effectiveEndBlock - svc.firstBlock;\n\n    el.innerHTML = `\n      <div class=\"svc-head\">\n        <div>\n          <div class=\"svc-title-wrap\">\n            <h2 class=\"svc-title\" data-copy=\"${escapeAttr(svc.name)}\">${escapeHtml(svc.name)}<\/h2>\n            ${verdictHtml}\n            ${indexers.map(ix => `\n              <span class=\"svc-verdict neutral\" style=\"font-weight:500\">\n                <span style=\"display:inline-block;width:7px;height:7px;border-radius:50%;background:var(${colorFor(ix.label, d.indexers)})\"><\/span>\n                ${escapeHtml(ix.label)}\n              <\/span>\n            `).join('')}\n          <\/div>\n          <div class=\"svc-meta\">\n            <span>range: <b>${fmtBlk(svc.firstBlock)}<\/b> → <b>${fmtBlk(svc.effectiveEndBlock)}<\/b><\/span>\n            <span>effective: <b>${fmtBlk(spanBlocks)}<\/b> blocks<\/span>\n            <span>breakpoints: <b>${svc.breakpoints.length}<\/b><\/span>\n          <\/div>\n        <\/div>\n        <div>${renderSparkline(svc, indexers, d)}<\/div>\n      <\/div>\n\n      ${renderInlineWarnings(svc)}\n\n      <div class=\"svc-body\">\n        <div class=\"panel-grid ${isCompare ? '' : 'single'}\">\n          <div>\n            <div class=\"panel-title\">Breakpoints · click a row for log excerpts<\/div>\n            ${renderBreakpointTable(svc, indexers, d)}\n          <\/div>\n          <div>\n            <div class=\"panel-title\">Progress — blocks vs wall time<\/div>\n            <div class=\"chart-wrap\"><canvas data-chart=\"${escapeAttr(svc.name)}\"><\/canvas><\/div>\n            <div class=\"chart-legend\">${indexers.map(ix => `\n              <span class=\"legend-item\">\n                <span class=\"legend-sw\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>\n                ${escapeHtml(ix.label)}\n              <\/span>`).join('')}\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div style=\"margin-top:22px\">\n          <div class=\"panel-title\">Tier 2 · errors, warns, restarts${Object.values(svc.tier2||{}).some(t=>t.multicallMeanMs!=null) ? ', multicall latency' : ''}<\/div>\n          ${renderTier2(svc, indexers, d)}\n        <\/div>\n\n        ${(svc.tier3 && svc.tier3.length) ? `\n          <div style=\"margin-top:22px\">\n            <div class=\"panel-title\">Tier 3 · auto-discovered <span style=\"color:var(--fg-3);text-transform:none;letter-spacing:0\">(namespaces ≥ 10 occurrences in all deployments)<\/span><\/div>\n            ${renderTier3(svc, indexers, d)}\n          <\/div>` : ''\n        }\n      <\/div>\n    `;\n\n    // Row click → modal\n    el.querySelectorAll('.bp-item').forEach(item => {\n      const open = () => openExcerpts(svc, +item.dataset.block, indexers, d);\n      item.addEventListener('click', (e) => {\n        if (e.target.closest('[data-copy]')) return;\n        open();\n      });\n      item.addEventListener('keydown', (e) => {\n        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }\n      });\n    });\n\n    return el;\n  }\n\n  function renderInlineWarnings(svc) {\n    const ws = svc.inlineWarnings || [];\n    if (!ws.length) return '';\n    return `<div class=\"warn-strip\">\n      ${ws.map(w => `\n        <div class=\"warn-item ${w.kind === 'never-caught-up' || w.kind === 'fetch-failed' ? 'bad' : ''}\">\n          <svg class=\"wi-icon\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"/>\n          <\/svg>\n          <div><span class=\"wi-kind\">${escapeHtml(w.kind)}<\/span>${w.label ? `<span class=\"mono\" style=\"color:var(--fg-2);margin-right:6px\">[${escapeHtml(w.label)}]<\/span>`:''}${escapeHtml(w.message)}<\/div>\n        <\/div>\n      `).join('')}\n    <\/div>`;\n  }\n\n  // ── sparkline (hand-drawn SVG) ───────────────────────────────────────\n  function renderSparkline(svc, indexers, d) {\n    const W = 160, H = 44, P = 4;\n    const allPts = indexers.flatMap(ix => svc.progress?.[ix.label] || []);\n    if (!allPts.length) return '';\n    const xMax = Math.max(...allPts.map(p => p.t));\n    const yMin = Math.min(...allPts.map(p => p.block));\n    const yMax = Math.max(...allPts.map(p => p.block));\n    const sx = t => P + (t/xMax) * (W - 2*P);\n    const sy = b => H - P - ((b - yMin)/(yMax - yMin || 1)) * (H - 2*P);\n\n    const paths = indexers.map(ix => {\n      const pts = svc.progress?.[ix.label] || [];\n      if (pts.length < 2) return '';\n      const d = pts.map((p,i) => (i === 0 ? 'M' : 'L') + sx(p.t).toFixed(1) + ' ' + sy(p.block).toFixed(1)).join(' ');\n      return `<path d=\"${d}\" fill=\"none\" stroke=\"var(${colorFor(ix.label, indexers)})\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.9\"/>`;\n    }).join('');\n\n    return `<svg class=\"spark\" width=\"${W}\" height=\"${H}\" viewBox=\"0 0 ${W} ${H}\" aria-hidden=\"true\">\n      <rect x=\"0.5\" y=\"0.5\" width=\"${W-1}\" height=\"${H-1}\" rx=\"5\" fill=\"var(--bg)\" stroke=\"var(--border)\"/>\n      ${paths}\n    <\/svg>`;\n  }\n\n  // ── breakpoint table ─────────────────────────────────────────────────\n  function renderBreakpointTable(svc, indexers, d) {\n    const isCompare = indexers.length > 1;\n\n    // Global max wall across ALL bps/indexers so bars share a scale\n    let maxWall = 0;\n    svc.breakpoints.forEach(bp => {\n      indexers.forEach(ix => {\n        const m = bp.perIndexer[ix.label];\n        if (m?.wallSec) maxWall = Math.max(maxWall, m.wallSec);\n      });\n    });\n    if (!maxWall) maxWall = 1;\n\n    const items = svc.breakpoints.map(bp => {\n      // Establish the fastest wallSec at this breakpoint (for delta + winner)\n      let bestLabel = null, bestWall = Infinity;\n      indexers.forEach(ix => {\n        const m = bp.perIndexer[ix.label];\n        if (m?.wallSec != null && m.reached !== false && m.wallSec < bestWall) {\n          bestWall = m.wallSec; bestLabel = ix.label;\n        }\n      });\n\n      const pctLabel = bp.pct != null ? `${bp.pct}%` : null;\n\n      // Header: pct + block + winner delta chip\n      let headerRight = '';\n      if (isCompare && bestLabel && isFinite(bestWall)) {\n        // find runner-up\n        let runnerWall = Infinity;\n        indexers.forEach(ix => {\n          if (ix.label === bestLabel) return;\n          const m = bp.perIndexer[ix.label];\n          if (m?.wallSec != null && m.wallSec < runnerWall) runnerWall = m.wallSec;\n        });\n        if (isFinite(runnerWall)) {\n          const diffPct = ((runnerWall - bestWall) / runnerWall) * 100;\n          headerRight = `<span class=\"bp-winner\">\n            <span class=\"bp-winner-dot\" style=\"background:var(${colorFor(bestLabel, d.indexers)})\"><\/span>\n            <span class=\"bp-winner-label\">${escapeHtml(bestLabel)}<\/span>\n            <span class=\"bp-winner-delta\">${diffPct.toFixed(1)}% faster<\/span>\n          <\/span>`;\n        }\n      }\n\n      const barRows = indexers.map(ix => {\n        const m = bp.perIndexer[ix.label];\n        if (!m) {\n          return `<div class=\"bp-bar-row muted\" data-label=\"${escapeAttr(ix.label)}\">\n            <span class=\"bp-bar-lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n            <span class=\"bp-bar-track\"><span class=\"bp-bar-empty\">no data<\/span><\/span>\n            <span class=\"bp-bar-val\">—<\/span>\n          <\/div>`;\n        }\n        if (m.reached === false) {\n          return `<div class=\"bp-bar-row muted\" data-label=\"${escapeAttr(ix.label)}\">\n            <span class=\"bp-bar-lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n            <span class=\"bp-bar-track\"><span class=\"bp-bar-empty\">never reached this block<\/span><\/span>\n            <span class=\"bp-bar-val\">—<\/span>\n          <\/div>`;\n        }\n\n        const wallPct = (m.wallSec / maxWall) * 100;\n        const activePct = (m.activeSec / m.wallSec) * wallPct;\n        const downPct = wallPct - activePct;\n        const isWinner = isCompare && ix.label === bestLabel;\n\n        // delta label (vs best for non-winners; \"fastest\" badge for winner)\n        let deltaLabel = '';\n        if (isCompare) {\n          if (isWinner) {\n            deltaLabel = `<span class=\"bp-delta win\">fastest<\/span>`;\n          } else {\n            const diff = ((m.wallSec - bestWall) / bestWall) * 100;\n            deltaLabel = `<span class=\"bp-delta slow\">+${diff.toFixed(1)}%<\/span>`;\n          }\n        }\n\n        return `<div class=\"bp-bar-row ${isWinner ? 'winner' : ''}\" data-label=\"${escapeAttr(ix.label)}\">\n          <span class=\"bp-bar-lab\">\n            <span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>\n            ${escapeHtml(ix.label)}\n          <\/span>\n          <span class=\"bp-bar-track\" title=\"wall ${fmtDur(m.wallSec)} · active ${fmtDur(m.activeSec)} · downtime ${fmtDur(m.downtimeSec)}\">\n            <span class=\"bp-bar-active\" style=\"width:${activePct}%;background:var(${colorFor(ix.label, d.indexers)})\"><\/span>\n            ${downPct > 0.3 ? `<span class=\"bp-bar-down\" style=\"width:${downPct}%\"><\/span>` : ''}\n          <\/span>\n          <span class=\"bp-bar-val\">\n            <span class=\"bp-wall\" data-copy=\"${m.wallSec}s\">${fmtDur(m.wallSec)}<\/span>\n            ${deltaLabel}\n          <\/span>\n          <span class=\"bp-bar-sub\">\n            <span>active <b>${fmtDurCompact(m.activeSec)}<\/b><\/span>\n            <span class=\"${m.downtimeSec > 0 ? 'dt-warn' : ''}\">downtime <b>${fmtDurCompact(m.downtimeSec)}<\/b><\/span>\n          <\/span>\n        <\/div>`;\n      }).join('');\n\n      return `<div class=\"bp-item\" data-block=\"${bp.block}\" role=\"button\" tabindex=\"0\" title=\"Click to view log excerpts\">\n        <div class=\"bp-item-head\">\n          <div class=\"bp-item-heading\">\n            ${pctLabel ? `<span class=\"bp-pct-chip\">${pctLabel}<\/span>` : ''}\n            <span class=\"bp-block-val mono\">block ${fmtBlk(bp.block)}<\/span>\n          <\/div>\n          ${headerRight}\n        <\/div>\n        <div class=\"bp-bars\">${barRows}<\/div>\n      <\/div>`;\n    }).join('');\n\n    // Legend for bar segments\n    const legend = `<div class=\"bp-legend\">\n      <span class=\"bp-leg-item\"><span class=\"sw sw-active\"><\/span>active (processing)<\/span>\n      <span class=\"bp-leg-item\"><span class=\"sw sw-down\"><\/span>downtime (gaps &gt; ${d.run.downtimeThresholdSec}s)<\/span>\n      <span class=\"bp-leg-note\">bars shared scale · click any breakpoint for log excerpts<\/span>\n    <\/div>`;\n\n    return `<div class=\"bp-list\">${items}<\/div>${legend}`;\n  }\n\n  // ── tier 2 ────────────────────────────────────────────────────────────\n  function renderTier2(svc, indexers, d) {\n    const cells = indexers.map(ix => {\n      const t2 = svc.tier2?.[ix.label];\n      if (!t2) return `<div class=\"t2-cell\" data-label=\"${escapeAttr(ix.label)}\"><div class=\"t2-lbl\">${escapeHtml(ix.label)}<span class=\"pill\">no data<\/span><\/div><\/div>`;\n      const restartsCls = t2.restarts > 0 ? 'warn' : 'dim';\n      const errorsCls = t2.errors > 0 ? (t2.errors > 10 ? 'bad' : 'warn') : 'dim';\n      const warnsCls = t2.warns > 20 ? 'warn' : 'dim';\n      return `<div class=\"t2-cell\" data-label=\"${escapeAttr(ix.label)}\">\n        <div class=\"t2-lbl\">\n          <span><span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:var(${colorFor(ix.label, d.indexers)});margin-right:6px\"><\/span>${escapeHtml(ix.label)}<\/span>\n        <\/div>\n        <div class=\"t2-rows\">\n          <div class=\"t2-row\"><span class=\"k\">restarts<\/span><span><\/span><span class=\"v ${restartsCls}\" data-copy=\"${t2.restarts}\">${t2.restarts}<\/span><\/div>\n          <div class=\"t2-row\"><span class=\"k\">errors<\/span><span><\/span><span class=\"v ${errorsCls}\" data-copy=\"${t2.errors}\">${t2.errors}<\/span><\/div>\n          <div class=\"t2-row\"><span class=\"k\">warns<\/span><span><\/span><span class=\"v ${warnsCls}\" data-copy=\"${t2.warns}\">${t2.warns}<\/span><\/div>\n          ${t2.multicallMeanMs != null ? `\n            <div class=\"t2-row\"><span class=\"k\">multicall μ<\/span><span><\/span><span class=\"v\" data-copy=\"${t2.multicallMeanMs}ms\">${t2.multicallMeanMs}ms<\/span><\/div>\n            <div class=\"t2-row\"><span class=\"k\">multicall p95<\/span><span><\/span><span class=\"v\" data-copy=\"${t2.multicallP95Ms}ms\">${t2.multicallP95Ms}ms<\/span><\/div>\n          `: ''}\n        <\/div>\n      <\/div>`;\n    }).join('');\n    return `<div class=\"t2-grid\">${cells}<\/div>`;\n  }\n\n  // ── tier 3 ────────────────────────────────────────────────────────────\n  function renderTier3(svc, indexers, d) {\n    const isCompare = indexers.length > 1;\n    const cards = svc.tier3.map(t3 => {\n      const unit = t3.unit ? `<span class=\"unit\">${escapeHtml(t3.unit)}<\/span>` : '';\n      if (!isCompare) {\n        const only = indexers[0];\n        const s = t3.perIndexer[only.label];\n        if (!s) return '';\n        return `<div class=\"t3-card\">\n          <div class=\"t3-ns\">${escapeHtml(t3.namespace)}<\/div>\n          <div class=\"t3-field\">${escapeHtml(t3.field)}${unit}<\/div>\n          <div class=\"t3-count\">n=${s.count.toLocaleString()}<\/div>\n          <div class=\"t3-stats\">\n            <div class=\"t3-stat\">μ<b data-copy=\"${s.mean}\">${fmtNum(s.mean)}<\/b><\/div>\n            <div class=\"t3-stat\">p50<b data-copy=\"${s.median}\">${fmtNum(s.median)}<\/b><\/div>\n            <div class=\"t3-stat\">p95<b data-copy=\"${s.p95}\">${fmtNum(s.p95)}<\/b><\/div>\n          <\/div>\n        <\/div>`;\n      }\n      // compare: show per-indexer rows with delta highlight on p95\n      const perIxRows = indexers.map(ix => {\n        const s = t3.perIndexer[ix.label];\n        if (!s) {\n          return `<div class=\"t3-series\" data-label=\"${escapeAttr(ix.label)}\">\n            <span class=\"lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n            <span style=\"grid-column:2/5;color:var(--fg-3);font-style:italic;font-size:12px\">no samples<\/span>\n          <\/div>`;\n        }\n        return `<div class=\"t3-series\" data-label=\"${escapeAttr(ix.label)}\">\n          <span class=\"lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n          <div class=\"t3-stat\">μ<b data-copy=\"${s.mean}\">${fmtNum(s.mean)}<\/b><\/div>\n          <div class=\"t3-stat\">p50<b data-copy=\"${s.median}\">${fmtNum(s.median)}<\/b><\/div>\n          <div class=\"t3-stat\">p95<b data-copy=\"${s.p95}\">${fmtNum(s.p95)}<\/b><\/div>\n        <\/div>`;\n      }).join('');\n\n      // total counts beside field\n      const totalN = indexers.reduce((a, ix) => a + (t3.perIndexer[ix.label]?.count || 0), 0);\n\n      return `<div class=\"t3-card\">\n        <div class=\"t3-ns\">${escapeHtml(t3.namespace)}<\/div>\n        <div class=\"t3-field\">${escapeHtml(t3.field)}${unit}<\/div>\n        <div class=\"t3-count\">n=${totalN.toLocaleString()} total<\/div>\n        <div class=\"t3-multi\">${perIxRows}<\/div>\n      <\/div>`;\n    }).join('');\n    return `<div class=\"t3-grid\">${cards}<\/div>`;\n  }\n\n  // ── progress chart (Chart.js) ─────────────────────────────────────────\n  function drawProgressChart(canvas, svc, d) {\n    if (canvas._chart) { canvas._chart.destroy(); canvas._chart = null; }\n    if (!window.Chart) {\n      canvas.parentElement.innerHTML = '<div class=\"empty\" style=\"padding:40px;text-align:center\">Chart.js not loaded<\/div>';\n      return;\n    }\n    const indexers = d.indexers.filter(i => svc.presentIn.includes(i.label));\n    const fgDim = cssVar('--fg-3') || '#888';\n    const borderCol = cssVar('--border') || '#ddd';\n    const fg = cssVar('--fg-2') || '#666';\n\n    const datasets = indexers.map((ix) => {\n      const pts = svc.progress?.[ix.label] || [];\n      const col = cssVar(colorFor(ix.label, d.indexers)) || '#58f';\n      return {\n        label: ix.label,\n        data: pts.map(p => ({ x: p.t, y: p.block })),\n        borderColor: col,\n        backgroundColor: col + '22',\n        pointRadius: 0,\n        pointHoverRadius: 4,\n        tension: 0.12,\n        borderWidth: 2,\n        fill: false,\n      };\n    });\n\n    canvas._chart = new Chart(canvas.getContext('2d'), {\n      type: 'line',\n      data: { datasets },\n      options: {\n        responsive: true,\n        maintainAspectRatio: false,\n        animation: false,\n        interaction: { mode: 'nearest', axis: 'x', intersect: false },\n        plugins: {\n          legend: { display: false },\n          tooltip: {\n            backgroundColor: cssVar('--surface'),\n            titleColor: cssVar('--fg'),\n            bodyColor: cssVar('--fg-2'),\n            borderColor: cssVar('--border-strong'),\n            borderWidth: 1,\n            padding: 10,\n            titleFont: { family: 'var(--font-mono)', size: 11 },\n            bodyFont: { family: 'var(--font-mono)', size: 12 },\n            callbacks: {\n              title: (items) => 'wall ' + fmtDur(items[0].parsed.x),\n              label: (item) => item.dataset.label + ': block ' + fmtBlk(item.parsed.y),\n            }\n          },\n        },\n        scales: {\n          x: {\n            type: 'linear',\n            title: { display: true, text: 'wall seconds', color: fgDim, font: { size: 10, family: 'var(--font-mono)' } },\n            ticks: { color: fgDim, font: { family: 'var(--font-mono)', size: 10 }, callback: (v) => fmtDurCompact(v) },\n            grid: { color: borderCol },\n            border: { color: borderCol },\n          },\n          y: {\n            type: 'linear',\n            title: { display: true, text: 'block', color: fgDim, font: { size: 10, family: 'var(--font-mono)' } },\n            ticks: { color: fgDim, font: { family: 'var(--font-mono)', size: 10 }, callback: (v) => fmtBlk(v) },\n            grid: { color: borderCol },\n            border: { color: borderCol },\n          }\n        }\n      }\n    });\n  }\n\n  // ── infra service renderer ────────────────────────────────────────────\n  function renderInfraService(svc, d) {\n    const indexers = d.indexers.filter(i => svc.presentIn.includes(i.label));\n    const el = document.createElement('article');\n    el.className = 'svc';\n    el.dataset.svc = svc.name;\n\n    const badges = indexers.map(ix => `\n      <span class=\"svc-verdict neutral\" style=\"font-weight:500\">\n        <span style=\"display:inline-block;width:7px;height:7px;border-radius:50%;background:var(${colorFor(ix.label, d.indexers)})\"><\/span>\n        ${escapeHtml(ix.label)}\n      <\/span>\n    `).join('');\n\n    const metaRows = indexers.map(ix => {\n      const pi = svc.perIndexer?.[ix.label];\n      if (!pi) return '';\n      const first = pi.firstTsMs ? new Date(pi.firstTsMs).toISOString().replace('T',' ').slice(0,19) : '—';\n      const last  = pi.lastTsMs  ? new Date(pi.lastTsMs).toISOString().replace('T',' ').slice(0,19)  : '—';\n      const span  = pi.spanMs != null ? fmtDur(pi.spanMs / 1000) : '—';\n      return `<div class=\"svc-meta\" data-label=\"${escapeAttr(ix.label)}\" style=\"gap:14px\">\n        <span><span class=\"dot\" style=\"display:inline-block;width:7px;height:7px;border-radius:50%;background:var(${colorFor(ix.label, d.indexers)})\"><\/span> <b>${escapeHtml(ix.label)}<\/b><\/span>\n        <span>range: <b>${escapeHtml(first)} → ${escapeHtml(last)}<\/b><\/span>\n        <span>span: <b>${escapeHtml(span)}<\/b><\/span>\n        <span>log lines: <b>${pi.lineCount.toLocaleString()}<\/b><\/span>\n        ${pi.errorCount ? `<span style=\"color:var(--warn)\">WARN/ERROR: <b>${pi.errorCount}<\/b><\/span>` : ''}\n      <\/div>`;\n    }).join('');\n\n    const tsEntries  = (svc.tier3 || []).filter(e => e.field != null);\n    const cntEntries = (svc.tier3 || []).filter(e => e.field == null);\n\n    const chartPanels = tsEntries.map(entry => {\n      const anySamples = indexers.some(ix => entry.perIndexer?.[ix.label]?.timeseries?.length);\n      if (!anySamples) return '';\n      const chartId = `${svc.name}__${entry.namespace}__${entry.field}`.replace(/[^a-zA-Z0-9_.-]/g, '_');\n      const statRows = indexers.map(ix => {\n        const s = entry.perIndexer?.[ix.label];\n        if (!s || s.count == null) {\n          return `<div class=\"t3-series\" data-label=\"${escapeAttr(ix.label)}\">\n            <span class=\"lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n            <span style=\"grid-column:2/5;color:var(--fg-3);font-style:italic;font-size:12px\">no samples<\/span>\n          <\/div>`;\n        }\n        return `<div class=\"t3-series\" data-label=\"${escapeAttr(ix.label)}\">\n          <span class=\"lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n          <div class=\"t3-stat\">μ<b data-copy=\"${s.mean}\">${fmtNum(s.mean)}<\/b><\/div>\n          <div class=\"t3-stat\">p50<b data-copy=\"${s.median}\">${fmtNum(s.median)}<\/b><\/div>\n          <div class=\"t3-stat\">p95<b data-copy=\"${s.p95}\">${fmtNum(s.p95)}<\/b><\/div>\n        <\/div>`;\n      }).join('');\n      const totalN = indexers.reduce((a, ix) => a + (entry.perIndexer?.[ix.label]?.count || 0), 0);\n      return `<div class=\"t3-card\" style=\"min-width:0\">\n        <div class=\"t3-ns\">${escapeHtml(entry.namespace)}<\/div>\n        <div class=\"t3-field\">${escapeHtml(entry.field)}<\/div>\n        <div class=\"t3-count\">n=${totalN.toLocaleString()} total<\/div>\n        <div class=\"chart-wrap\" style=\"height:180px;margin:10px 0\">\n          <canvas data-infra-chart=\"${escapeAttr(svc.name)}\" data-namespace=\"${escapeAttr(entry.namespace)}\" data-field=\"${escapeAttr(entry.field)}\" id=\"${escapeAttr(chartId)}\"><\/canvas>\n        <\/div>\n        <div class=\"t3-multi\">${statRows}<\/div>\n      <\/div>`;\n    }).filter(Boolean).join('');\n\n    const countCards = cntEntries.map(entry => {\n      const rows = indexers.map(ix => {\n        const s = entry.perIndexer?.[ix.label];\n        const count = s?.count ?? 0;\n        return `<div class=\"t3-series\" data-label=\"${escapeAttr(ix.label)}\">\n          <span class=\"lab\"><span class=\"dot\" style=\"background:var(${colorFor(ix.label, d.indexers)})\"><\/span>${escapeHtml(ix.label)}<\/span>\n          <div class=\"t3-stat\" style=\"grid-column:2/5\">lines<b data-copy=\"${count}\">${count.toLocaleString()}<\/b><\/div>\n        <\/div>`;\n      }).join('');\n      return `<div class=\"t3-card\">\n        <div class=\"t3-ns\">${escapeHtml(entry.namespace)}<\/div>\n        <div class=\"t3-field\" style=\"color:var(--fg-3);font-style:italic\">(no numeric fields)<\/div>\n        <div class=\"t3-multi\">${rows}<\/div>\n      <\/div>`;\n    }).join('');\n\n    el.innerHTML = `\n      <div class=\"svc-head\">\n        <div>\n          <div class=\"svc-title-wrap\">\n            <h2 class=\"svc-title\" data-copy=\"${escapeAttr(svc.name)}\">${escapeHtml(svc.name)}<\/h2>\n            <span class=\"svc-verdict neutral\">infra<\/span>\n            ${badges}\n          <\/div>\n        <\/div>\n      <\/div>\n      <div class=\"svc-body\">\n        ${metaRows}\n        ${chartPanels ? `\n          <div style=\"margin-top:22px\">\n            <div class=\"panel-title\">Tier 3 · time series (numeric fields, downsampled)<\/div>\n            <div class=\"t3-grid\">${chartPanels}<\/div>\n          <\/div>` : `\n          <div style=\"margin-top:22px;color:var(--fg-3);font-style:italic\">No numeric tier-3 samples in the captured window.<\/div>`\n        }\n        ${countCards ? `\n          <div style=\"margin-top:22px\">\n            <div class=\"panel-title\">Count-only namespaces<\/div>\n            <div class=\"t3-grid\">${countCards}<\/div>\n          <\/div>` : ''\n        }\n      <\/div>\n    `;\n    return el;\n  }\n\n  // ── infra chart (per tier-3 field, time series) ──────────────────────\n  function drawInfraChart(canvas, svc, entry, d) {\n    if (canvas._chart) { canvas._chart.destroy(); canvas._chart = null; }\n    if (!window.Chart) {\n      canvas.parentElement.innerHTML = '<div class=\"empty\" style=\"padding:40px;text-align:center\">Chart.js not loaded<\/div>';\n      return;\n    }\n    const indexers = d.indexers.filter(i => svc.presentIn.includes(i.label));\n    const fgDim = cssVar('--fg-3') || '#888';\n    const borderCol = cssVar('--border') || '#ddd';\n\n    const datasets = indexers.map(ix => {\n      const pts = entry.perIndexer?.[ix.label]?.timeseries || [];\n      const col = cssVar(colorFor(ix.label, d.indexers)) || '#58f';\n      return {\n        label: ix.label,\n        data: pts.map(p => ({ x: p.t, y: p.v })),\n        borderColor: col,\n        backgroundColor: col + '22',\n        pointRadius: 0,\n        pointHoverRadius: 3,\n        tension: 0.12,\n        borderWidth: 1.4,\n        fill: false,\n      };\n    });\n\n    canvas._chart = new Chart(canvas.getContext('2d'), {\n      type: 'line',\n      data: { datasets },\n      options: {\n        responsive: true,\n        maintainAspectRatio: false,\n        animation: false,\n        interaction: { mode: 'nearest', axis: 'x', intersect: false },\n        plugins: {\n          legend: { display: false },\n          tooltip: {\n            backgroundColor: cssVar('--surface'),\n            titleColor: cssVar('--fg'),\n            bodyColor: cssVar('--fg-2'),\n            borderColor: cssVar('--border-strong'),\n            borderWidth: 1,\n            padding: 8,\n            titleFont: { family: 'var(--font-mono)', size: 11 },\n            bodyFont: { family: 'var(--font-mono)', size: 11 },\n            callbacks: {\n              title: (items) => 'wall ' + fmtDurCompact(items[0].parsed.x),\n              label: (item) => item.dataset.label + ': ' + fmtNum(item.parsed.y) + ' ' + entry.field,\n            }\n          },\n        },\n        scales: {\n          x: {\n            type: 'linear',\n            title: { display: true, text: 'wall seconds', color: fgDim, font: { size: 10, family: 'var(--font-mono)' } },\n            ticks: { color: fgDim, font: { family: 'var(--font-mono)', size: 10 }, callback: (v) => fmtDurCompact(v) },\n            grid: { color: borderCol },\n            border: { color: borderCol },\n          },\n          y: {\n            type: 'linear',\n            title: { display: true, text: entry.field, color: fgDim, font: { size: 10, family: 'var(--font-mono)' } },\n            ticks: { color: fgDim, font: { family: 'var(--font-mono)', size: 10 }, callback: (v) => fmtNum(v) },\n            grid: { color: borderCol },\n            border: { color: borderCol },\n          }\n        }\n      }\n    });\n  }\n\n  // ── log excerpt modal ─────────────────────────────────────────────────\n  function openExcerpts(svc, blk, indexers, d) {\n    const body = document.getElementById('modal-body');\n    document.getElementById('modal-title').textContent = `${svc.name} · block ${fmtBlk(blk)}`;\n    document.getElementById('modal-sub').textContent = `±window around breakpoint`;\n\n    const groups = indexers.map(ix => {\n      const lines = svc.logExcerpts?.[ix.label]?.[blk];\n      const colVar = colorFor(ix.label, d.indexers);\n      return `<section class=\"excerpt-group\" data-label=\"${escapeAttr(ix.label)}\">\n        <header>\n          <span class=\"dot\" style=\"background:var(${colVar})\"><\/span>\n          <b style=\"color:var(--fg)\">${escapeHtml(ix.label)}<\/b>\n          <span style=\"color:var(--fg-3)\">${escapeHtml(ix.ref || '')}<\/span>\n        <\/header>\n        ${lines && lines.length\n          ? `<pre>${lines.map(escapeHtml).join('\\n')}<\/pre>`\n          : `<pre style=\"color:var(--fg-3);font-style:italic\">No excerpts captured for this breakpoint. Re-run with --include-excerpts to capture log windows.<\/pre>`\n        }\n      <\/section>`;\n    }).join('');\n    body.innerHTML = groups;\n\n    document.getElementById('modal-scrim').classList.add('open');\n  }\n\n  // ── utils ────────────────────────────────────────────────────────────\n  function escapeHtml(s) { return String(s ?? '').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c])); }\n  function escapeAttr(s) { return escapeHtml(s); }\n})();\n\n<\/script>\n\n\n\n<\/body><\/html>"
  </script>
